<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录账号 | Liou_Yang Server</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="login">
    <main class="login-page">
      <section class="login-card">
        <a class="brand login-brand" href="/index.html">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>Liou_Yang Server</span>
        </a>
        <h1>登录账号</h1>
        <form id="loginForm" class="login-form">
          <input id="loginUsername" autocomplete="username" placeholder="账号名" required />
          <input id="loginPassword" type="password" autocomplete="current-password" placeholder="密码（新账号至少 6 位）" required />
          <input id="loginTotpCode" inputmode="numeric" maxlength="6" placeholder="双重验证码（已开启时填写）" />
          <button class="button primary" type="submit">进入服务器社区</button>
        </form>
        <section class="slider-captcha" id="sliderCaptcha" aria-labelledby="sliderCaptchaTitle">
          <div class="slider-captcha-head">
            <strong id="sliderCaptchaTitle">安全验证</strong>
            <button type="button" id="captchaRefresh" aria-label="刷新验证">刷新</button>
          </div>
          <div class="captcha-stage" id="captchaStage" aria-live="polite">
            <img class="captcha-bg" id="captchaBg" alt="" />
            <img class="captcha-piece" id="captchaPiece" alt="" />
            <div class="captcha-mask" id="captchaMask">加载验证中</div>
          </div>
          <div class="captcha-track" id="captchaTrack">
            <span class="captcha-track-text" id="captchaTrackText">按住滑块，拖到缺口处</span>
            <button class="captcha-thumb" id="captchaThumb" type="button" aria-label="拖动完成验证">
              <span aria-hidden="true">›</span>
            </button>
          </div>
        </section>
      </section>
    </main>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
